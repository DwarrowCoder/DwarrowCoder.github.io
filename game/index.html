<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Custom Card Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Card Game</h1>
  <div id="game-board">
    <!-- Player Areas -->
    <div class="player-area" data-player="1">
      <h2>Player 1 (Health: <span class="health">20</span>)</h2>
      <div class="zone hand" data-zone="hand"></div>
      <div class="zone battlefield" data-zone="battlefield"></div>
    </div>

    <div class="player-area" data-player="2">
      <h2>Player 2 (Health: <span class="health">20</span>)</h2>
      <div class="zone hand" data-zone="hand"></div>
      <div class="zone battlefield" data-zone="battlefield"></div>
    </div>

    <!-- Shared Zones -->
    <div class="shared-zone">
      <h3>Deck</h3>
      <div class="zone deck" data-zone="deck"></div>
    </div>
    <div class="shared-zone">
      <h3>Discard</h3>
      <div class="zone discard" data-zone="discard"></div>
    </div>
  </div>

  <button onclick="loadGame()">Load Game</button>
  <button onclick="saveGame()">Save Game</button>

  <script src="script.js"></script>
</body>
</html>
