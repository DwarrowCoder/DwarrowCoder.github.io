<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>The Nova Phoenix Saga - Galaxy Map</title>
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
        <link rel="stylesheet" href="./css/main.css">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <script src="./js/nav.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
        <!-- Turf.js -->
        <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
        <style>
            #map {
                height: 80vh;
                background: #000;        /* pure black space */
                border: 2px solid #444;
                border-radius: 8px;
            }

            .leaflet-container {
                background: #000 !important;
            }


        </style>
    </head>
    <body class="w3-gray">
        <header id="top" class="w3-container w3-center">
            <h1>The Nova Phoenix Saga</h1>
            <div class="w3-padding" style="width:100%">
                <img src="./images/nova.jpg" class="w3-image">
            </div>
            <nav id="navbar" class="w3-bar w3-border w3-card">
            </nav>
            <script>
                loadNavbar("./nav-gaming-rpgs-campaigns-novaphoenix.html");
            </script>
            <h2>Galaxy Map</h2>
        </header>
        <section class="w3-container">
            <div id="map"></div>
        </section>
        <section class="w3-container">
            <div id="controls" class="w3-container w3-card">
                <h3>Hyperspace Navicomputer</h3>

                <p><strong>Waypoints:</strong></p>
                <ul id="waypointList" style="margin:0; padding-left:20px; font-size:0.9em;"></ul>
                <button class="w3-border w3-button" onclick="clearWaypoints()" style="margin:8px 0;">Clear All Waypoints</button><br>

                <label>Hyperdrive Class: <input id="hdClass" type="number" value="1" step="0.5" style="width:60px"></label><br>
                <label>User Modifier (e.g. superior nav): <input id="userMod" type="number" value="1" step="0.1" style="width:60px"></label><br><br>
  
                <button class="w3-border w3-button" onclick="calculateRoute('waypoint', parseFloat(document.getElementById('hdClass').value), parseFloat(document.getElementById('userMod').value))">Calculate Waypoint Route</button>
                <button class="w3-border w3-button" onclick="calculateRoute('fastest', parseFloat(document.getElementById('hdClass').value), parseFloat(document.getElementById('userMod').value))">Fastest Route (Lanes, First 2 Points)</button>
                <button class="w3-border w3-button" onclick="calculateRoute('direct', parseFloat(document.getElementById('hdClass').value), parseFloat(document.getElementById('userMod').value))">Direct Jump (Off-Route, First 2 Points)</button>
  
                <div id="result" style="margin-top:15px; font-size:0.9em;"></div>
            </div>
        </section>
        <footer class="w3-container">
            <p><i>
                Uses <a href="https://leafletjs.com/">Leaflet</a>, <a href="https://turfjs.org/">Turf</a>, and
                <a href="https://github.com/Wason1797/StarWarsMap">Wladymir Brborich (StarWarsMap)</a> for initial planet data and for initial route information.
            </i></p>
        </footer>
        <script>
            // Map Init
            const map = L.map('map', {
                minZoom: -8,
                maxZoom: 6,
                zoomSnap: 0.5,                  // Smoother zoom steps
                zoomDelta: 0.5,
                center: [0, 0],
                zoom: -4,
                crs: L.CRS.Simple
            });

            L.tileLayer('', {
                attribution: 'Star Wars Galaxy – Data: Wladymir Brborich (StarWarsMap)',
            }).addTo(map);

            const galaxyBounds = L.latLngBounds(
                L.latLng(-85, -95),   // SW corner (y min, x min)
                L.latLng(70, 135)      // NE corner (y max, x max)
            );
            map.fitBounds(galaxyBounds, { padding: [50, 50] });

            //var boradin = L.marker([4740, 8365]).addTo(map);
            //boradin.bindTooltip('Boradin')
            //var unknown = L.marker([2300, 9450]).addTo(map);
            //unknown.bindTooltip('[Unkown System]')

            // ====================== CONFIG ======================
            const MAX_WAYPOINTS = 10;
            const GRID_UNITS_PER_SQUARE = 100; // Tune this once so a typical Core-to-Rim major route = ~40-80 hours on Class 1
            const HOURS_PER_SQUARE = {
                major: 8,
                minor: 14,
                offroute: 20,
                deepCore: 24
            };

            // Major route names (add more as needed)
            const MAJOR_ROUTES = new Set([
                "Corellian Run", "Hydian Way", "Perlemian Trade Route", "Rimma Trade Route",
                "Corellian Trade Spine", "Corellian Trade Route", "Hydian", "Perlemian"
            ]);

            // ====================== HELPERS ======================
            function isMajorRoute(name) {
                if (!name) return false;
                return MAJOR_ROUTES.has(name) || name.toLowerCase().includes("corellian") || name.toLowerCase().includes("hydian");
            }

            function planarLength(coords) { // LineString or array of [x,y]
                let total = 0;
                for (let i = 1; i < coords.length; i++) {
                    const dx = coords[i][0] - coords[i-1][0];
                    const dy = coords[i][1] - coords[i-1][1];
                    total += Math.hypot(dx, dy);
                }
                return total;
            }

            function planarDistance(pt1, pt2) {
                return Math.hypot(pt1[0] - pt2[0], pt1[1] - pt2[1]);
            }

            function getRegionModifier(region1, region2) {
                const deep = ["Deep Core", "Core Worlds"];
                if (deep.some(r => region1.includes(r) || region2.includes(r))) return 1.5;
                return 1.0;
            }

            // ====================== PRIORITY QUEUE (Binary Min-Heap) ======================
            // Simple, efficient binary heap for numbers/strings (min-heap: smallest first)
            class MinHeap {
              constructor() {
                this.heap = []; // { priority: number, key: string, data?: any }
              }
            
              push(priority, key) {
                this.heap.push({ priority, key });
                this._bubbleUp(this.heap.length - 1);
              }
            
              pop() {
                if (this.heap.length === 0) return null;
                if (this.heap.length === 1) return this.heap.pop();
            
                const min = this.heap[0];
                this.heap[0] = this.heap.pop();
                this._sinkDown(0);
                return min;
              }
            
              isEmpty() {
                return this.heap.length === 0;
              }
            
              _bubbleUp(index) {
                const element = this.heap[index];
                while (index > 0) {
                  const parentIndex = Math.floor((index - 1) / 2);
                  const parent = this.heap[parentIndex];
                  if (parent.priority <= element.priority) break;
                  this.heap[index] = parent;
                  index = parentIndex;
                }
                this.heap[index] = element;
              }
            
              _sinkDown(index) {
                const length = this.heap.length;
                const element = this.heap[index];
            
                while (true) {
                  let left = 2 * index + 1;
                  let right = 2 * index + 2;
                  let swap = null;
                  let smallest = index;
            
                  if (left < length && this.heap[left].priority < this.heap[smallest].priority) {
                    smallest = left;
                  }
                  if (right < length && this.heap[right].priority < this.heap[smallest].priority) {
                    smallest = right;
                  }
                  if (smallest === index) break;
            
                  this.heap[index] = this.heap[smallest];
                  index = smallest;
                }
                this.heap[index] = element;
              }
            }

            // ====================== OPTIMIZED DIJKSTRA FOR PLANET-TO-PLANET GRAPH ======================
            function findShortestPath(startKey, endKey) {
              // startKey and endKey are planet names (strings), e.g. "Coruscant", "Tatooine"
            
              if (typeof startKey !== 'string' || typeof endKey !== 'string') {
                console.error("findShortestPath: startKey and endKey must be planet name strings");
                return null;
              }
            
              if (!graph.has(startKey) || !graph.has(endKey)) {
                console.warn(`No path possible: ${startKey} or ${endKey} not in graph`);
                return null;
              }
            
              const distances = new Map();   // planetName → best known total cost
              const previous  = new Map();   // planetName → previous planetName
              const pq = new MinHeap();      // min-heap priority queue
            
              // Initialize
              distances.set(startKey, 0);
              pq.push(0, startKey);
            
              while (!pq.isEmpty()) {
                const { priority: currentCost, key: current } = pq.pop();
            
                // Skip outdated entries (multiple entries allowed for same node)
                if (currentCost > (distances.get(current) || Infinity)) continue;
            
                // Early exit when we dequeue the destination (optimal path found)
                if (current === endKey) break;
            
                const node = graph.get(current);
                if (!node) continue;
            
                for (const { key: neighbor, weight } of node.neighbors) {
                  // weight is pre-calculated (distance × hours_per_square)
                  const alt = currentCost + weight;
            
                  if (alt < (distances.get(neighbor) || Infinity)) {
                    distances.set(neighbor, alt);
                    previous.set(neighbor, current);
                    pq.push(alt, neighbor);  // push new better estimate
                  }
                }
              }
            
              if (!distances.has(endKey)) {
                console.warn(`No route found between ${startKey} and ${endKey}`);
                return null;
              }
            
              // Reconstruct path as array of planet names
              const pathNames = [];
              let current = endKey;
              while (current !== startKey) {
                pathNames.unshift(current);
                current = previous.get(current);
                if (!current) {
                  console.error("Path reconstruction failed - broken previous map");
                  return null;
                }
              }
              pathNames.unshift(startKey);
            
              return {
                path: pathNames,               // e.g. ["Coruscant", "Corellia", "Tatooine"]
                cost: distances.get(endKey)    // total base hours (before hyperdrive class / modifiers)
              };
            }

            // ====================== LOAD DATA ======================
            let pathFinder, hyperspaceFC, planetsData, planetLayer, routeLayer, lanesLayer;
            let userWaypoints = [];
            let graph = new Map(); // key: "x,y" → { neighbors: [{key: "x2,y2", weight: number, type: "major"|"minor"}], ... }

            async function initNavigator() {
                try
                {
                    // Load hyperspace (your existing GeoJSON)
                    const hsRes = await fetch('./data/hyperlanes.json');
                    if (!hsRes.ok) throw new Error(`Hyperspace fetch failed: ${hsRes.status}`);
                    hyperspaceFC = await hsRes.json();

                    // Load planets (parzivail style)
                    const pRes = await fetch('./data/planets.geojson');
                    if (!pRes.ok) throw new Error(`Planets fetch failed: ${pRes.status}`);
                    const planetsGeo = await pRes.json();
                    planetsData = planetsGeo.features;
                } catch(err) {
                    console.error(err);
                    alert("Failed to load galaxy data: check console & file paths");
                }

                // ====================== BUILD GRAPH ONCE ======================
                hyperspaceFC.forEach(route => {
                  const type = route.type; // 'major' or 'minor' (already tagged)
                  const nodes = route.nodes;
                
                  for (let i = 0; i < nodes.length - 1; i++) {
                    const fromName = String(nodes[i]);
                    const toName   = String(nodes[i + 1]);

                    const fromPlanet = planetsData.find(p => p.properties.name.toLowerCase() === fromName.toLowerCase());
                    const toPlanet   = planetsData.find(p => p.properties.name.toLowerCase() === toName.toLowerCase());

                    if (!fromPlanet || !toPlanet) {
                        console.warn(`Skipping connection ${fromName} → ${toName} (planet not found in data)`);
                        continue;
                    }

                    const fromKey = fromPlanet.name;  // or normalize: fromPlanet.name.replace(/\s+/g, '_')
                    const toKey   = toPlanet.name;

                    // Calculate distance between planets (your planarDistance function)
                    const dist = planarDistance([fromPlanet.X, fromPlanet.Y], [toPlanet.X, toPlanet.Y]);

                    // Convert to "travel cost" (same as before)
                    const weight = (dist / GRID_UNITS_PER_SQUARE) *
                        (type === 'major' ? HOURS_PER_SQUARE.major : HOURS_PER_SQUARE.minor);
                    
                    // Add bidirectional edge
                    if (!graph.has(fromKey)) graph.set(fromKey, { neighbors: [] });
                    if (!graph.has(toKey))   graph.set(toKey,   { neighbors: [] });

                    graph.get(fromKey).neighbors.push({ key: toKey,   weight, type, route: route.name });
                    graph.get(toKey).neighbors.push(  { key: fromKey, weight, type, route: route.name });
                  }
                });

                console.log(`Graph built with ${graph.size} planet nodes and ${hyperspaceFC.length} routes`);

                // Add planets to map (assume your map var is called "map")
                planetLayer = L.layerGroup().addTo(map);
                planetsData.forEach(feature => {
                    const props = feature.properties;
                    const coords = feature.geometry.coordinates;  // [lng/x, lat/y]
                    const marker = L.circleMarker([coords[1], coords[0]], {  // Leaflet [lat, lng]
                      radius: 6,
                      color: '#00ff00',
                      fillColor: '#0066cc',
                      fillOpacity: 0.8,
                      interactive: true
                    });
                    marker.planetData = {  // mimic your old structure
                      Name: props.name || "unknown",
                      Region: props.region
                    };
                    marker.on('click', (e) => {
                        e.originalEvent.stopPropagation();
                        addWaypoint(marker);
                    });
                    marker.bindTooltip(`<b>${marker.planetData.Name}</b><br>${marker.planetData.Region || 'Unknown'}`);
                    planetLayer.addLayer(marker);
                });

                routeLayer = L.layerGroup().addTo(map);
                updateWaypointList();

                console.log('✅ Star Wars Hyperspace Navigator ready!');
            }
    
            // ====================== WAYPOINTS ======================
            function addWaypoint(marker) {
                if (userWaypoints.length >= MAX_WAYPOINTS) {
                    alert(`Max ${MAX_WAYPOINTS} waypoints reached. Clear first.`);
                    return;
                }
    
                userWaypoints.push(marker);
                marker.setStyle({fillColor: '#ff6600', color: '#ff9900'}); // Highlight added
    
                updateWaypointList();
            }
    
            function clearWaypoints() {
                userWaypoints.forEach(m => {
                    m.setStyle({fillColor: '#0066cc', color: '#00ccff'});
                });
                userWaypoints = [];
                routeLayer.clearLayers();
                updateWaypointList();
            }
    
            function updateWaypointList() {
                const list = document.getElementById('waypointList');
                if (!list) return;
                list.innerHTML = userWaypoints.map((m, i) => 
                    `<li>#${i+1}: ${m.planetData.Name}</li>`
                ).join('') || '<li>No waypoints added yet</li>';
            }
    
            // ====================== CALCULATORS ======================
            function calculateRoute(mode = 'fastest', hyperdriveClass = 1, userMod = 1) {
                if (userWaypoints.length < 2) return alert('Add at least 2 waypoints by clicking planets');
    
                routeLayer.clearLayers();
                let segments = [];
                let totalHours = 0;
                let breakdown = [];
                let start;
                let end;
    
                if (mode === 'fastest') {
                    const startName = userWaypoints[0].planetData.Name;
                    const endName   = userWaypoints[1].planetData.Name;
                  
                    const pathResult = findShortestPath(startName, endName);
                  
                    if (pathResult) {
                      // Build coordinates for polyline from planet positions
                      const pathCoords = pathResult.path.map(name => {
                        const planet = planetsData.find(p => p.properties?.name === name || p.Name === name);
                        if (!planet) return null;
                        const coords = planet.geometry?.coordinates || [planet.X, planet.Y];
                        return [coords[1], coords[0]];  // [lat=Y, lng=X]
                      }).filter(Boolean);
                  
                      L.polyline(pathCoords, {
                        color: '#00ff00',
                        weight: 5,
                        opacity: 0.8
                      }).addTo(routeLayer);
                  
                      const baseHours = pathResult.cost;
                      const regionMod = getRegionModifier(
                        userWaypoints[0].planetData.properties.region,
                        userWaypoints[1].planetData.properties.region
                      );
                      totalHours = baseHours * hyperdriveClass * regionMod * userMod;
                  
                      breakdown.push(`Network route via ${pathResult.path.length - 2} intermediate systems: ${baseHours.toFixed(1)} base hours`);
                    } else {
                      start = userWaypoints[0];
                      end = userWaypoints[1];
                      const startPt = [start.X, start.Y];
                      const endPt = [end.X, end.Y];
                      const dist = planarDistance(startPt, endPt);
                      const baseHours = (dist / GRID_UNITS_PER_SQUARE) * HOURS_PER_SQUARE.offroute;
                      const regionMod = getRegionModifier(start.Region, end.Region);
                      totalHours = baseHours * hyperdriveClass * regionMod * userMod * 1.3; // off-route penalty
      
                      L.polyline([[start.Y, start.X], [end.Y, end.X]], {color: '#ff0000', dashArray: '5,10'}).addTo(routeLayer);
                      breakdown.push(`Direct off-route: ${baseHours.toFixed(1)} base hours`);
                    }
                } 
                else if (mode === 'direct') {
                    start = userWaypoints[0];
                    end = userWaypoints[1];
                    const startPt = [start.X, start.Y];
                    const endPt = [end.X, end.Y];
                    const dist = planarDistance(startPt, endPt);
                    const baseHours = (dist / GRID_UNITS_PER_SQUARE) * HOURS_PER_SQUARE.offroute;
                    const regionMod = getRegionModifier(start.Region, end.Region);
                    totalHours = baseHours * hyperdriveClass * regionMod * userMod * 1.3; // off-route penalty
    
                    L.polyline([[start.Y, start.X], [end.Y, end.X]], {color: '#ff0000', dashArray: '5,10'}).addTo(routeLayer);
                    breakdown.push(`Direct off-route: ${baseHours.toFixed(1)} base hours`);
                } 
                else if (mode === 'waypoint') {
                    for (let i = 0; i < userWaypoints.length - 1; i++) {
                        const startKey = userWaypoints[i].planetData.Name;
                        const endKey = userWaypoints[i+1].planetData.Name;
    
                        let segment = {
                            from: startKey,
                            to: endKey,
                            type: 'unknown',
                            baseHours: 0,
                            color: '#888'
                        };
    
                        // Try network route first
                        const pathResult = findShortestPath(startKey, endKey);
    
                        if (pathResult) {
                            // Build coordinates for polyline from planet positions
                            const pathCoords = pathResult.path.map(name => {
                            const planet = planetsData.find(p => p.properties?.name === name || p.Name === name);
                            if (!planet) return null;
                            const coords = planet.geometry?.coordinates || [planet.X, planet.Y];
                            return [coords[1], coords[0]];  // [lat=Y, lng=X]
                            }).filter(Boolean);
                        
                            L.polyline(pathCoords, {
                            color: '#00ff00',
                            weight: 5,
                            opacity: 0.8
                            }).addTo(routeLayer);
                        
                            const baseHours = pathResult.cost;
                            const regionMod = getRegionModifier(
                            userWaypoints[0].planetData.properties.region,
                            userWaypoints[1].planetData.properties.region
                            );
                            totalHours = baseHours * hyperdriveClass * regionMod * userMod;
                        
                            breakdown.push(`Network route via ${pathResult.path.length - 2} intermediate systems: ${baseHours.toFixed(1)} base hours`);
    
                        } else {
                            // Fallback: direct off-route
                            const dist = planarDistance([start.X, start.Y], [end.X, end.Y]);
                            const baseHours = (dist / GRID_UNITS_PER_SQUARE) * HOURS_PER_SQUARE.offroute;
                            segment.baseHours = baseHours;
                            segment.type = 'direct/off-route';
                            segment.color = '#ff0000';
    
                            L.polyline([[start.Y, start.X], [end.Y, end.X]], {
                                color: segment.color,
                                dashArray: '10, 5',
                                weight: 4
                            }).addTo(routeLayer).bindTooltip(`${start.Name} → ${end.Name}<br>Direct jump (off-route)<br>${baseHours.toFixed(1)} base hrs`);
                        }
    
                        // Apply modifiers per segment
                        const regionMod = getRegionModifier(start.Region, end.Region);
                        const segmentHours = segment.baseHours * hyperdriveClass * regionMod * userMod;
                        totalHours += segmentHours;
    
                        breakdown.push({
                            leg: `${i+1}: ${start.Name} → ${end.Name}`,
                            type: segment.type,
                            base: segment.baseHours.toFixed(1),
                            mod: `×${hyperdriveClass.toFixed(1)} ×${regionMod.toFixed(1)} ×${userMod.toFixed(1)}`,
                            hours: segmentHours.toFixed(1)
                        });
    
                        segments.push(segment);
                    }
                }
    
                // Final display
                const hours = totalHours.toFixed(1);
                const days = (totalHours / 24).toFixed(1);
    
                let title = 'Route Calculation';
                let extraInfo = '';
                
                if (mode === 'waypoint') {
                  title = `Waypoint Route (${userWaypoints.length} stops)`;
                  extraInfo = `
                    <small>User mod: ×${userMod} | Segments: ${userWaypoints.length - 1}</small>
                    <table style="width:100%; margin-top:10px; border-collapse:collapse;">
                      <tr><th>Leg</th><th>Type</th><th>Base hrs</th><th>Mods</th><th>Final hrs</th></tr>
                      ${breakdown.map(b => `
                        <tr style="border-bottom:1px solid #ddd;">
                          <td>${b.leg}</td><td>${b.type}</td><td>${b.base}</td><td>${b.mod}</td><td><b>${b.hours}</b></td>
                        </tr>
                      `).join('')}
                    </table>
                  `;
                } else {
                  const startName = userWaypoints[0].planetData.Name || 'Start';
                  const endName = userWaypoints[1].planetData.Name || 'End';
                  title = `${startName} → ${endName}`;
                  extraInfo = `
                    <small>Region mod: ×${getRegionModifier(userWaypoints[0].planetData.Region || '', userWaypoints[1].planetData.Region || '').toFixed(1)} | User mod: ×${userMod}</small>
                    <ul>${breakdown.map(b => `<li>${b}</li>`).join('')}</ul>
                  `;
                }
                
                document.getElementById('result').innerHTML = `
                  <h3>${title}</h3>
                  <p><strong>${hours} hours (${days} days)</strong> at Class ${hyperdriveClass}</p>
                  ${extraInfo}
                `;
            }
    
            document.addEventListener('DOMContentLoaded', () => {
              initNavigator();
            });
        </script>
    </body>
</html>
